  {h:'低估',p:'dīgū',b:'ㄉㄧ ㄍㄨ',e:'to underestimate; to undervalue',con:'neg',reg:'cas',freq:'high',ety:'低(dī) low + 估(gū) estimate. To estimate too low — to underestimate.',comp:'低(dī low) + 估(gū estimate)',ex:'很多人低估了學語言需要的時間和毅力。',exen:'Many people underestimate the time and persistence required to learn a language.',src:'class',tags:''},
  {h:'放空',p:'fàngkōng',b:'ㄈㄤˋ ㄎㄨㄥ',e:'to zone out; to mentally check out; to let your mind go blank',con:'neu',reg:'cas',freq:'high',ety:'放(fàng) release + 空(kōng) empty. Releasing into emptiness — letting your mind go blank.',comp:'放(fàng release) + 空(kōng empty)',ex:'工作壓力太大的時候，她喜歡放空十分鐘，什麼都不想。',exen:'When work stress gets too heavy, she likes to zone out for ten minutes and think about nothing.',src:'class',tags:'slang'},
  {h:'里程碑',p:'lǐchéngbēi',b:'ㄌㄧˇ ㄔㄥˊ ㄅㄟ',e:'milestone; a significant marker of progress',con:'pos',reg:'for',freq:'high',ety:'里程(lǐchéng) mileage/distance traveled + 碑(bēi) stone monument. A stone marker along the road — a milestone.',comp:'里(lǐ unit of distance) + 程(chéng journey) + 碑(bēi stone marker)',ex:'拿到第一個客戶是她創業旅程中的重要里程碑。',exen:'Getting her first client was an important milestone in her entrepreneurial journey.',src:'class',tags:'business'},
  {h:'見人說人話見鬼說鬼話',p:'jiàn rén shuō rén huà jiàn guǐ shuō guǐ huà',b:'ㄐㄧㄢˋ ㄖㄣˊ ㄕㄨㄛ ㄖㄣˊ ㄏㄨㄚˋ ㄐㄧㄢˋ ㄍㄨㄟˇ ㄕㄨㄛ ㄍㄨㄟˇ ㄏㄨㄚˋ',e:'tell people what they want to hear; adapt your message to your audience',con:'neg',reg:'cas',freq:'med',ety:'With people (人) speak human language; with ghosts (鬼) speak ghost language. Chameleon-like adaptability in communication — can be admired as social skill or criticized as two-faced.',comp:'見(jiàn see/meet) + 人(rén person) + 鬼(guǐ ghost) + 說話(shuōhuà speak)',ex:'她在職場上很會見人說人話見鬼說鬼話，每個老闆都喜歡她。',exen:'She\'s a master at telling people what they want to hear — every boss loves her.',src:'class',tags:'idiom'},
  {h:'讀萬卷書不如行萬里路',p:'dú wàn juàn shū bùrú xíng wàn lǐ lù',b:'ㄉㄨˊ ㄨㄢˋ ㄐㄩㄢˋ ㄕㄨ ㄅㄨˋ ㄖㄨˊ ㄒㄧㄥˊ ㄨㄢˋ ㄌㄧˇ ㄌㄨˋ',e:'experience is the best teacher; traveling ten thousand miles beats reading ten thousand books',con:'pos',reg:'for',freq:'med',ety:'Reading ten thousand volumes of books (讀萬卷書) is not as good as (不如) traveling ten thousand li of road (行萬里路). Knowledge from books is valuable but real-world experience surpasses it.',comp:'讀(dú read) + 萬卷書(wànjuànshū ten thousand books) + 不如(bùrú not as good as) + 行萬里路(xíngwànlǐlù travel far)',ex:'讀萬卷書不如行萬里路，出去工作才真的懂這個行業。',exen:'Experience beats book learning — going out and working teaches you more about an industry than any book.',src:'class',tags:'idiom'},
  {h:'柔性殖民主義',p:'róuxìng zhímín zhǔyì',b:'ㄖㄡˊ ㄒㄧㄥˋ ㄓˊ ㄇㄧㄣˊ ㄓㄨˇ ㄧˋ',e:'soft colonialism; cultural or economic domination without direct force',con:'neg',reg:'for',freq:'low',ety:'柔性(róuxìng) soft/flexible + 殖民(zhímín) colonialism + 主義(zhǔyì) -ism. Colonialism that works through economic influence, media, and culture rather than military force.',comp:'柔(róu soft) + 性(xìng nature) + 殖民(zhímín colonialism) + 主義(zhǔyì ideology)',ex:'有學者認為好萊塢電影是一種柔性殖民主義的工具。',exen:'Some scholars argue that Hollywood films are a tool of soft colonialism.',src:'class',tags:''},
  {h:'爭議',p:'zhēngyì',b:'ㄓㄥ ㄧˋ',e:'controversy; dispute; contentious',con:'neg',reg:'for',freq:'high',ety:'爭(zhēng) to contend/argue + 議(yì) discuss/debate. Arguing and debating — controversy.',comp:'爭(zhēng argue/contend) + 議(yì discuss/debate)',ex:'這個政策引發了很大的爭議，社會各界都有不同看法。',exen:'This policy sparked major controversy — different sectors of society have very different views.',src:'class',tags:''},
  {h:'靈感',p:'línggǎn',b:'ㄌㄧㄥˊ ㄍㄢˇ',e:'inspiration; creative spark',con:'pos',reg:'cas',freq:'high',ety:'靈(líng) spirit/magical + 感(gǎn) feeling/sense. A magical feeling — inspiration that seems to come from beyond.',comp:'靈(líng spirit/magical) + 感(gǎn feeling)',ex:'她說洗澡的時候最容易有靈感，腦子特別清楚。',exen:'She says inspiration comes easiest in the shower — her mind is especially clear.',src:'class',tags:''},
  {h:'內耗',p:'nèihào',b:'ㄋㄟˋ ㄏㄠˋ',e:'internal friction; draining energy through overthinking or internal conflict',con:'neg',reg:'cas',freq:'high',ety:'內(nèi) internal + 耗(hào) consume/drain. Energy consumed from within — mental drain from overthinking, self-doubt, or unresolved internal conflict.',comp:'內(nèi internal) + 耗(hào consume/drain)',ex:'她最大的問題不是能力不足，而是太容易內耗，想太多。',exen:'Her biggest problem isn\'t lack of ability — it\'s that she drains herself through overthinking.',src:'class',tags:'psychology slang'},
  {h:'爆發力',p:'bàofālì',b:'ㄅㄠˋ ㄈㄚ ㄌㄧˋ',e:'explosive power; ability to make a big push in a short time; burst capacity',con:'pos',reg:'cas',freq:'med',ety:'爆發(bàofā) explode/burst out + 力(lì) power. The power to explode — the capacity for a sudden intense push.',comp:'爆(bào explode) + 發(fā burst out) + 力(lì power)',ex:'她在截止日期前總是爆發力驚人，一天可以完成別人一週的工作量。',exen:'Right before deadlines her burst capacity is incredible — she can do in a day what others do in a week.',src:'class',tags:''},
  {h:'直球面對',p:'zhíqiú miànduì',b:'ㄓˊ ㄑㄧㄡˊ ㄇㄧㄢˋ ㄉㄨㄟˋ',e:'to face something head-on; to tackle it directly; to rip off the band-aid',con:'pos',reg:'cas',freq:'high',ety:'直球(zhíqiú) straight ball (baseball term) + 面對(miànduì) face. Throwing a straight pitch right at it — confronting something directly without dancing around it.',comp:'直(zhí straight/direct) + 球(qiú ball) + 面(miàn face) + 對(duì toward)',ex:'這個問題拖太久了，應該直球面對，跟他直接談清楚。',exen:'This issue has dragged on too long — time to face it head-on and talk it through directly.',src:'class',tags:'slang'},
  {h:'社交能量',p:'shèjiāo néngliàng',b:'ㄕㄜˋ ㄐㄧㄠ ㄋㄥˊ ㄌㄧㄤˋ',e:'social energy; social battery',con:'neu',reg:'cas',freq:'high',ety:'社交(shèjiāo) social + 能量(néngliàng) energy. The energy you have available for social interaction — your social battery.',comp:'社交(shèjiāo social) + 能量(néngliàng energy)',ex:'她是個內向的人，參加完派對後社交能量完全耗盡。',exen:'She\'s an introvert — after a party her social battery is completely drained.',src:'class',tags:'psychology'},
  {h:'再求有再求好',p:'zài qiú yǒu zài qiú hǎo',b:'ㄗㄞˋ ㄑㄧㄡˊ ㄧㄡˇ ㄗㄞˋ ㄑㄧㄡˊ ㄏㄠˇ',e:'first make it exist, then make it good; done is better than perfect',con:'pos',reg:'cas',freq:'med',ety:'先求有(xiān qiú yǒu) first seek to have it exist + 再求好(zài qiú hǎo) then seek to make it good. A startup and creative philosophy — ship first, refine later.',comp:'求有(qiú yǒu seek existence) + 求好(qiú hǎo seek quality)',ex:'創業初期最重要的是再求有再求好，完美主義只會讓你原地踏步。',exen:'In early-stage startups the most important thing is to ship first and improve later — perfectionism just keeps you stuck.',src:'class',tags:'business'},
  {h:'托無可拖',p:'tuō wú kě tuō',b:'ㄊㄨㄛ ㄨˊ ㄎㄜˇ ㄊㄨㄛ',e:'can\'t procrastinate any further; no more delaying possible',con:'neg',reg:'cas',freq:'med',ety:'托/拖(tuō) procrastinate/delay + 無可(wú kě) nothing possible. There is nothing left that can be delayed — you must act now.',comp:'拖(tuō delay) + 無(wú nothing) + 可(kě possible) + 拖(tuō delay)',ex:'論文截止日期明天到，真的托無可拖，今晚必須完成。',exen:'The thesis deadline is tomorrow — I really can\'t delay any further, it has to be done tonight.',src:'class',tags:''},
  {h:'進進退退',p:'jìnjìn tuìtuì',b:'ㄐㄧㄣˋ ㄐㄧㄣˋ ㄊㄨㄟˋ ㄊㄨㄟˋ',e:'one step forward two steps back; going back and forth without progress',con:'neg',reg:'cas',freq:'med',ety:'進(jìn) advance + 退(tuì) retreat, both doubled for emphasis. Advancing and retreating repeatedly — the frustrating feeling of going nowhere despite effort.',comp:'進(jìn advance) + 退(tuì retreat)',ex:'這個談判進進退退了好幾個月，雙方都很疲憊。',exen:'The negotiation went back and forth for months — both sides are exhausted.',src:'class',tags:''},
  {h:'截然不同',p:'jiérán bùtóng',b:'ㄐㄧㄝˊ ㄖㄢˊ ㄅㄨˋ ㄊㄨㄥˊ',e:'completely different; starkly different; night and day',con:'neu',reg:'for',freq:'high',ety:'截然(jiérán) completely/sharply cut off + 不同(bùtóng) different. Cut sharply apart — completely and starkly different.',comp:'截(jié cut off) + 然(rán so/thus) + 不(bù not) + 同(tóng same)',ex:'她在家裡和在工作上的表現截然不同，讓人很驚訝。',exen:'Her behavior at home and at work is completely different — it surprises people.',src:'class',tags:'connector'},
  {h:'視覺化',p:'shìjuéhuà',b:'ㄕˋ ㄐㄩㄝˊ ㄏㄨㄚˋ',e:'to visualize; visualization',con:'pos',reg:'for',freq:'high',ety:'視覺(shìjué) visual sense + 化(huà) -ize. To make visual — visualization.',comp:'視(shì see) + 覺(jué sense/feel) + 化(huà transform into)',ex:'把目標視覺化，例如貼照片在牆上，真的有助於實現夢想。',exen:'Visualizing your goals — like putting photos on the wall — really does help you achieve them.',src:'class',tags:''},
  {h:'愚蠢',p:'yúchǔn',b:'ㄩˊ ㄔㄨㄣˇ',e:'stupid; foolish; silly',con:'neg',reg:'cas',freq:'high',ety:'愚(yú) foolish/ignorant + 蠢(chǔn) stupid/clumsy. Both characters mean stupid — combined for emphasis.',comp:'愚(yú foolish) + 蠢(chǔn stupid/clumsy)',ex:'她事後回想，覺得當時的決定真的很愚蠢。',exen:'Looking back, she thought the decision she made at the time was really stupid.',src:'class',tags:''},
  {h:'詐欺',p:'zhàqī',b:'ㄓㄚˋ ㄑㄧ',e:'fraud; scam; to defraud',con:'neg',reg:'for',freq:'high',ety:'詐(zhà) deceive/swindle + 欺(qī) cheat/bully. Deceiving and cheating — fraud.',comp:'詐(zhà deceive) + 欺(qī cheat/bully)',ex:'她差點被網路詐欺騙走一大筆錢，幸好及時發現。',exen:'She almost got scammed out of a large sum online — fortunately she caught it in time.',src:'class',tags:''},
  {h:'一錯再錯',p:'yī cuò zài cuò',b:'ㄧ ㄘㄨㄛˋ ㄗㄞˋ ㄘㄨㄛˋ',e:'to keep making the same mistake; to double down on an error',con:'neg',reg:'cas',freq:'high',ety:'一錯(yī cuò) one mistake + 再錯(zài cuò) make the mistake again. Making a mistake once, then making it again — compounding errors.',comp:'一(yī one) + 錯(cuò wrong/mistake) + 再(zài again) + 錯(cuò wrong)',ex:'他明知道這個策略行不通，卻還是一錯再錯，不願意改變。',exen:'He knew the strategy wasn\'t working but kept making the same mistake — unwilling to change.',src:'class',tags:''},
  {h:'固執',p:'gùzhí',b:'ㄍㄨˋ ㄓˊ',e:'stubborn; obstinate; pig-headed',con:'neg',reg:'cas',freq:'high',ety:'固(gù) solid/firm + 執(zhí) hold/grasp. Firmly grasping and not letting go — stubbornness.',comp:'固(gù solid/firm) + 執(zhí hold/grasp)',ex:'他太固執了，即使別人提出更好的方法也不願意嘗試。',exen:'He\'s so stubborn that even when someone suggests a better approach he refuses to try it.',src:'class',tags:''},
  {h:'高級酸',p:'gāojí suān',b:'ㄍㄠ ㄐㄧˊ ㄙㄨㄢ',e:'sophisticated sarcasm; saying one thing while meaning another; high-level shade',con:'neg',reg:'cas',freq:'med',ety:'高級(gāojí) high-level/sophisticated + 酸(suān) sour/envious/sarcastic. High-level sourness — sophisticated shade that sounds complimentary but cuts deep. No profanity, all implication.',comp:'高級(gāojí sophisticated) + 酸(suān sour/sarcastic)',ex:'她說「你今天氣色真的很特別」，這種高級酸讓人哭笑不得。',exen:'She said \'you have a really unique complexion today\' — that kind of sophisticated shade leaves you not knowing whether to laugh or cry.',src:'class',tags:'slang'},
  {h:'懂王',p:'dǒngwáng',b:'ㄉㄨㄥˇ ㄨㄤˊ',e:'know-it-all; someone who acts like they know everything',con:'neg',reg:'cas',freq:'med',ety:'懂(dǒng) understand/know + 王(wáng) king. King of knowing — internet slang for someone who constantly acts like the biggest expert in the room. Originally associated with Trump.',comp:'懂(dǒng understand) + 王(wáng king)',ex:'會議上那個同事一直插嘴，完全是個懂王。',exen:'That colleague kept interrupting the meeting — total know-it-all energy.',src:'class',tags:'slang mainland'},
  {h:'復盤',p:'fùpán',b:'ㄈㄨˋ ㄆㄢˊ',e:'to review; to debrief; to replay a situation to learn from it',con:'pos',reg:'cas',freq:'high',ety:'復(fù) redo/replay + 盤(pán) board (as in a game board). Replaying the board — reviewing a game or situation move by move to learn from it. Now widely used in business for post-mortems.',comp:'復(fù replay/redo) + 盤(pán board/replay)',ex:'每次專案結束後，團隊都會花時間復盤，找出可以改進的地方。',exen:'After every project the team takes time to debrief and identify areas for improvement.',src:'class',tags:'business mainland'},
  {h:'該咋咋地',p:'gāi zǎ zǎ de',b:'ㄍㄞ ㄗㄚˇ ㄗㄚˇ ㄉㄜ',e:'do what you have to do; whatever happens happens; just go for it',con:'neu',reg:'cas',freq:'med',ety:'Colloquial Mainland Northern Chinese expression. 該(gāi) should/whatever + 咋(zǎ) how/whatever (dialect) + 地(de suffix). Whatever needs to happen, let it happen — a casual acceptance of consequences.',comp:'該(gāi should/whatever) + 咋(zǎ whatever way) + 地(de adverbial suffix)',ex:'申請了就申請了，該咋咋地，結果怎樣都接受。',exen:'Applied is applied — whatever happens happens, I\'ll accept whatever the outcome is.',src:'class',tags:'slang mainland'},
  {h:'雞婆',p:'jīpó',b:'ㄐㄧ ㄆㄛˊ',e:'busybody; nosy; minding other people\'s business',con:'neg',reg:'cas',freq:'high',ety:'雞婆(jīpó) literally \'hen woman\' — a Taiwanese/Hokkien-origin term for someone who meddles in others\' affairs like a hen clucking around.',comp:'雞(jī chicken/hen) + 婆(pó old woman/matron)',ex:'她很雞婆，別人的事情她都要管一下。',exen:'She\'s such a busybody — she has to stick her nose into everyone\'s business.',src:'class',tags:'slang'},
  {h:'唱衰',p:'chàngshuāi',b:'ㄔㄤˋ ㄕㄨㄞ',e:'to predict failure; to be a Debbie Downer; to talk something down',con:'neg',reg:'cas',freq:'high',ety:'唱(chàng) to sing/voice + 衰(shuāi) decline/failure. Singing the song of decline — loudly predicting or promoting the idea that something will fail.',comp:'唱(chàng sing/voice) + 衰(shuāi decline/failure)',ex:'大家都在唱衰這個新創公司，但她堅持做下去，最後成功了。',exen:'Everyone was predicting this startup would fail, but she kept going and ultimately succeeded.',src:'class',tags:''},
  {h:'撕破臉',p:'sīpò liǎn',b:'ㄙ ㄆㄛˋ ㄌㄧㄢˇ',e:'to openly break ties; to tear up the relationship; to go from civil to hostile',con:'neg',reg:'cas',freq:'high',ety:'撕(sī) tear + 破(pò break) + 臉(liǎn face. Tearing the face apart — destroying the polite surface of a relationship and going openly hostile.',comp:'撕(sī tear) + 破(pò break/destroy) + 臉(liǎn face)',ex:'他們吵到最後撕破臉，在會議室當著所有人的面大吵一架。',exen:'They ended up openly breaking ties — screaming at each other in the conference room in front of everyone.',src:'class',tags:''},
  {h:'黑臉白臉',p:'hēiliǎn báiliǎn',b:'ㄏㄟ ㄌㄧㄢˇ ㄅㄞˊ ㄌㄧㄢˇ',e:'good cop bad cop strategy; one person plays tough one plays nice',con:'neu',reg:'cas',freq:'high',ety:'黑臉(hēiliǎn) black face (stern/tough) + 白臉(báiliǎn) white face (kind/gentle). From Chinese opera character types — the bad guy and the good guy working together as a strategy.',comp:'黑(hēi black) + 臉(liǎn face) + 白(bái white) + 臉(liǎn face)',ex:'那對父母很擅長唱黑臉白臉，一個嚴格一個溫柔，效果很好。',exen:'That couple is great at good cop bad cop — one strict one gentle, very effective.',src:'class',tags:'idiom'},
  {h:'心累',p:'xīnlèi',b:'ㄒㄧㄣ ㄌㄟˋ',e:'emotionally tired; drained from emotional labor or stress',con:'neg',reg:'cas',freq:'high',ety:'心(xīn) heart/mind + 累(lèi tired. The heart is tired — not physical exhaustion but the drain of emotional burden.',comp:'心(xīn heart/mind) + 累(lèi tired)',ex:'不是身體累，是心累，這份工作消耗了太多情緒。',exen:'It\'s not physical fatigue — I\'m emotionally drained. This job takes too much out of you emotionally.',src:'class',tags:'slang'},
  {h:'婉轉',p:'wǎnzhuǎn',b:'ㄨㄢˇ ㄓㄨㄢˇ',e:'tactful; gentle and roundabout; indirect but kind',con:'pos',reg:'for',freq:'med',ety:'婉(wǎn) graceful/gentle + 轉(zhuǎn) turn/wind. Gently winding around — saying something difficult in a kind, roundabout way.',comp:'婉(wǎn graceful) + 轉(zhuǎn wind/turn)',ex:'她婉轉地提出了不同意見，讓對方完全沒有感到被攻擊。',exen:'She raised her disagreement so tactfully that the other person didn\'t feel attacked at all.',src:'class',tags:''},
  {h:'柏拉圖精神出軌',p:'bólātú jīngshén chūguǐ',b:'ㄅㄛˊ ㄌㄚ ㄊㄨˊ ㄐㄧㄥ ㄕㄣˊ ㄔㄨ ㄍㄨㄟˇ',e:'emotional cheating; platonic emotional affair',con:'neg',reg:'cas',freq:'med',ety:'柏拉圖(bólātú) Platonic (Plato) + 精神(jīngshén) spiritual/emotional + 出軌(chūguǐ) derail/cheat. A Platonic emotional derailment — emotional intimacy with someone outside the relationship without physical infidelity.',comp:'柏拉圖(Plato) + 精神(jīngshén emotional/spiritual) + 出軌(chūguǐ go off track/cheat)',ex:'她跟那個男同事每天深夜聊天，被男友說是柏拉圖精神出軌。',exen:'She was chatting with that male colleague late every night — her boyfriend called it an emotional affair.',src:'class',tags:''},
  {h:'遺憾',p:'yíhàn',b:'ㄧˊ ㄏㄢˋ',e:'regret; a pity; something to be sorry about',con:'neg',reg:'cas',freq:'high',ety:'遺(yí) leave behind/lose + 憾(hàn) regret. Something left behind as regret — an unfulfilled wish that stays with you.',comp:'遺(yí leave behind) + 憾(hàn regret)',ex:'她最大的遺憾是沒有在父親去世前告訴他自己有多愛他。',exen:'Her biggest regret is not telling her father how much she loved him before he passed.',src:'class',tags:''},
  {h:'號召力',p:'hàozhàolì',b:'ㄏㄠˋ ㄓㄠˋ ㄌㄧˋ',e:'ability to rally people; influence; the power to mobilize others',con:'pos',reg:'for',freq:'med',ety:'號召(hàozhào) to call out/rally + 力(lì) power. The power to call people to action — charismatic influence.',comp:'號(hào call out/号) + 召(zhào summon) + 力(lì power)',ex:'她的號召力很強，一個貼文就能動員幾千人參與。',exen:'She has incredible mobilizing power — one post can get thousands of people to participate.',src:'class',tags:''},
  {h:'精疲力竭',p:'jīngpí lìjié',b:'ㄐㄧㄥ ㄆㄧˊ ㄌㄧˋ ㄐㄧㄝˊ',e:'utterly exhausted; drained of all energy',con:'neg',reg:'for',freq:'high',ety:'精(jīng) essence/spirit + 疲(pí) tired + 力(lì) strength + 竭(jié) exhausted/depleted. Spirit tired, strength depleted — total exhaustion.',comp:'精(jīng spirit/essence) + 疲(pí tired) + 力(lì strength) + 竭(jié depleted)',ex:'跑完馬拉松後她精疲力竭，連說話的力氣都沒有。',exen:'After finishing the marathon she was utterly exhausted — no energy even to speak.',src:'class',tags:'idiom'},
  {h:'平行',p:'píngxíng',b:'ㄆㄧㄥˊ ㄒㄧㄥˊ',e:'parallel; running alongside without intersecting',con:'neu',reg:'for',freq:'high',ety:'平(píng) flat/level + 行(xíng) go/travel. Going at the same level — parallel.',comp:'平(píng flat/level) + 行(xíng go/travel)',ex:'她覺得他們的人生就像平行線，永遠不會相交。',exen:'She felt like their lives were parallel lines that would never intersect.',src:'class',tags:''},
  {h:'銷售',p:'xiāoshòu',b:'ㄒㄧㄠ ㄕㄡˋ',e:'sales; to sell',con:'neu',reg:'for',freq:'high',ety:'銷(xiāo) sell/circulate + 售(shòu) sell. Both characters mean to sell — combined for emphasis in formal commercial contexts.',comp:'銷(xiāo sell/circulate) + 售(shòu sell)',ex:'這個季度的銷售數字比去年同期成長了三十趴。',exen:'Sales figures this quarter grew thirty percent compared to the same period last year.',src:'class',tags:'business'},
  {h:'行銷',p:'xíngxiāo',b:'ㄒㄧㄥˊ ㄒㄧㄠ',e:'marketing',con:'neu',reg:'for',freq:'high',ety:'行(xíng) execute/carry out + 銷(xiāo) sell/circulate. Carrying out the selling — marketing (Taiwan usage; Mainland uses 市場營銷).',comp:'行(xíng execute) + 銷(xiāo sell)',ex:'她從工程師轉職到行銷，因為她更喜歡直接面對消費者。',exen:'She switched from engineering to marketing because she preferred working directly with consumers.',src:'class',tags:'business'},
  {h:'賣點',p:'màidiǎn',b:'ㄇㄞˋ ㄉㄧㄢˇ',e:'selling point; unique value proposition',con:'pos',reg:'for',freq:'high',ety:'賣(mài) sell + 點(diǎn) point. The point you sell on — what makes something attractive to buyers.',comp:'賣(mài sell) + 點(diǎn point)',ex:'這款產品最大的賣點是它的簡單易用，不需要任何技術知識。',exen:'This product\'s biggest selling point is how simple and easy to use it is — no technical knowledge required.',src:'class',tags:'business'},
  {h:'複利',p:'fùlì',b:'ㄈㄨˋ ㄌㄧˋ',e:'compound interest; incremental compounding growth',con:'pos',reg:'for',freq:'med',ety:'複(fù) compound/repeated + 利(lì) interest/benefit. Repeated interest — compound interest, now used broadly for any compounding effect over time.',comp:'複(fù compound/repeated) + 利(lì interest/benefit)',ex:'學習的複利效應是最好的投資，每天進步一點點，幾年後差很多。',exen:'The compounding effect of learning is the best investment — improve a little every day and after a few years the difference is enormous.',src:'class',tags:'business'},
  {h:'拓展',p:'tuòzhǎn',b:'ㄊㄨㄛˋ ㄓㄢˇ',e:'to expand; to develop; to extend (network, business, skills)',con:'pos',reg:'for',freq:'high',ety:'拓(tuò) open up/expand + 展(zhǎn) develop/spread out. Opening up and spreading out — expansion.',comp:'拓(tuò open up) + 展(zhǎn develop/spread)',ex:'她這次去新加坡的目的是拓展亞洲市場的人脈。',exen:'Her purpose in going to Singapore was to expand her network in the Asian market.',src:'class',tags:'business'},
  {h:'首要之務',p:'shǒuyào zhī wù',b:'ㄕㄡˇ ㄧㄠˋ ㄓ ㄨˋ',e:'top priority; the most important thing to do',con:'neu',reg:'for',freq:'med',ety:'首要(shǒuyào) primary/most important + 之(zhī connecting particle) + 務(wù task/duty). The most important duty — top priority.',comp:'首(shǒu head/first) + 要(yào important) + 務(wù task/duty)',ex:'現在的首要之務是穩定現金流，其他的事情可以之後再說。',exen:'The top priority right now is stabilizing cash flow — everything else can wait.',src:'class',tags:'business'},
  {h:'領域',p:'lǐngyù',b:'ㄌㄧㄥˇ ㄩˋ',e:'field; domain; area of expertise',con:'neu',reg:'for',freq:'high',ety:'領(lǐng) territory/lead + 域(yù) area/region. An area of territory — a domain or field.',comp:'領(lǐng territory) + 域(yù area/region)',ex:'她在人工智慧領域已經耕耘了十年，是公認的專家。',exen:'She\'s been working in the AI field for ten years — a recognized expert.',src:'class',tags:'business'},
  {h:'失禮',p:'shīlǐ',b:'ㄕ ㄌㄧˇ',e:'impolite; lacking courtesy; a social misstep',con:'neg',reg:'for',freq:'med',ety:'失(shī) lose/miss + 禮(lǐ) courtesy/etiquette. Missing the mark on courtesy — a breach of etiquette.',comp:'失(shī miss/lose) + 禮(lǐ courtesy/ritual)',ex:'他在長輩面前沒有問候，被家人說很失禮。',exen:'He didn\'t greet the elders — his family told him it was very rude.',src:'class',tags:''},
  {h:'討喜',p:'tǎoxǐ',b:'ㄊㄠˇ ㄒㄧˇ',e:'likable; bubbly; endearing; crowd-pleasing',con:'pos',reg:'cas',freq:'high',ety:'討(tǎo) seek/win + 喜(xǐ) happiness/approval. Winning happiness from others — being naturally likable and endearing.',comp:'討(tǎo seek/win) + 喜(xǐ happiness/approval)',ex:'她這個人非常討喜，不管到哪個場合都能讓大家開心。',exen:'She\'s incredibly likable — no matter what gathering she goes to, she makes everyone happy.',src:'class',tags:''},
  {h:'不加思索',p:'bù jiā sīsuǒ',b:'ㄅㄨˋ ㄐㄧㄚ ㄙ ㄙㄨㄛˇ',e:'without thinking; off the top of one\'s head; impulsively',con:'neg',reg:'cas',freq:'med',ety:'不(bù) not + 加(jiā) add + 思索(sīsuǒ) thought/deliberation. Without adding any deliberation — not thinking before acting or speaking.',comp:'不(bù not) + 加(jiā add) + 思(sī think) + 索(suǒ search/deliberate)',ex:'她不加思索地答應了，後來才發現那天她已經有約了。',exen:'She agreed without thinking and only later realized she already had plans that day.',src:'class',tags:''},
  {h:'齊頭並進',p:'qí tóu bìng jìn',b:'ㄑㄧˊ ㄊㄡˊ ㄅㄧㄥˋ ㄐㄧㄣˋ',e:'to go hand in hand; to advance together simultaneously',con:'pos',reg:'for',freq:'med',ety:'齊頭(qí tóu) even/level heads + 並進(bìng jìn) advance together. Moving forward at the same level together — parallel progress.',comp:'齊(qí even/aligned) + 頭(tóu head) + 並(bìng together) + 進(jìn advance)',ex:'這個計畫的兩個部分需要齊頭並進，不能顧此失彼。',exen:'The two parts of this plan need to advance simultaneously — you can\'t focus on one at the expense of the other.',src:'class',tags:'business'},
  {h:'天馬行空',p:'tiānmǎ xíngkōng',b:'ㄊㄧㄢ ㄇㄚˇ ㄒㄧㄥˊ ㄎㄨㄥ',e:'wildly imaginative; free-ranging; unconstrained thinking',con:'pos',reg:'cas',freq:'high',ety:'天馬(tiānmǎ) heavenly horse + 行空(xíngkōng) travel through the sky. A heavenly horse galloping through the sky — imagination that roams freely without limits.',comp:'天(tiān heaven) + 馬(mǎ horse) + 行(xíng travel) + 空(kōng sky/empty)',ex:'她的提案天馬行空，很有創意，但執行難度很高。',exen:'Her proposal was wildly creative, but executing it would be extremely difficult.',src:'class',tags:'idiom'},
  {h:'殺手鐧',p:'shāshǒujiǎn',b:'ㄕㄚ ㄕㄡˇ ㄐㄧㄢˇ',e:'trump card; last resort; secret weapon',con:'pos',reg:'cas',freq:'med',ety:'Originally a concealed weapon (鐧) used as a last resort. Now used for a trump card or decisive move kept in reserve.',comp:'殺手(shāshǒu killer/assassin) + 鐧(jiǎn a type of weapon)',ex:'他在談判最後關頭拿出殺手鐧，讓對方完全沒有準備。',exen:'He pulled out his trump card at the last moment of negotiations — the other side had no idea it was coming.',src:'class',tags:''},
  {h:'微妙',p:'wēimiào',b:'ㄨㄟ ㄇㄧㄠˋ',e:'subtle; delicate; nuanced',con:'neu',reg:'for',freq:'high',ety:'微(wēi) tiny/minute + 妙(miào) wonderful/subtle. Wonderfully tiny — something delicate and nuanced that\'s hard to pin down.',comp:'微(wēi tiny/minute) + 妙(miào subtle/wonderful)',ex:'他們兩個人之間的關係非常微妙，讓旁邊的人都看不懂。',exen:'The relationship between those two is extremely subtle — people around them can\'t figure it out.',src:'class',tags:''},
  {h:'未雨綢繆',p:'wèi yǔ chóumóu',b:'ㄨㄟˋ ㄩˇ ㄔㄡˊ ㄇㄡˊ',e:'to prepare before it rains; to plan ahead; saving for a rainy day',con:'pos',reg:'for',freq:'med',ety:'未雨(wèi yǔ) before rain + 綢繆(chóumóu) prepare/bind carefully. Preparing carefully before the rain comes — proactive planning.',comp:'未(wèi before) + 雨(yǔ rain) + 綢繆(chóumóu prepare carefully)',ex:'她很早就開始存退休金，真的很會未雨綢繆。',exen:'She started saving for retirement very early — she\'s really good at planning ahead.',src:'class',tags:'idiom'},
  {h:'見機行事',p:'jiànjī xíngshì',b:'ㄐㄧㄢˋ ㄐㄧ ㄒㄧㄥˊ ㄕˋ',e:'to adapt to circumstances; to act according to the situation',con:'pos',reg:'for',freq:'med',ety:'見機(jiànjī) see the opportunity/moment + 行事(xíngshì) act/handle. Seeing the moment and acting accordingly — situational adaptability.',comp:'見(jiàn see) + 機(jī opportunity/moment) + 行(xíng act) + 事(shì affairs)',ex:'計畫趕不上變化，有時候就是要見機行事，隨機應變。',exen:'Plans can\'t keep up with change — sometimes you just have to adapt to the situation as it develops.',src:'class',tags:'idiom'},
  {h:'亂槍打鳥',p:'luàn qiāng dǎ niǎo',b:'ㄌㄨㄢˋ ㄑㄧㄤ ㄉㄚˇ ㄋㄧㄠˇ',e:'to see what sticks; to try everything and hope something works; scattershot approach',con:'neg',reg:'cas',freq:'med',ety:'亂(luàn) randomly + 槍(qiāng) gun + 打鳥(dǎ niǎo) shoot birds. Firing randomly at birds and hoping one gets hit — a chaotic, untargeted approach.',comp:'亂(luàn random/chaotic) + 槍(qiāng gun) + 打(dǎ hit) + 鳥(niǎo bird)',ex:'她在求職初期亂槍打鳥，投了幾十份履歷，毫無策略。',exen:'In her early job search she took a scattershot approach — sending out dozens of resumes with no strategy.',src:'class',tags:'idiom'},
  {h:'老生常談',p:'lǎoshēng chángtán',b:'ㄌㄠˇ ㄕㄥ ㄔㄤˊ ㄊㄢˊ',e:'cliché; a tired old topic; something talked about too many times',con:'neg',reg:'for',freq:'med',ety:'老生(lǎoshēng) old scholar/elderly person + 常談(chángtán) frequently discussed. The old scholar\'s oft-repeated topic — a cliché that everyone has heard too many times.',comp:'老(lǎo old) + 生(shēng scholar) + 常(cháng often) + 談(tán talk/discuss)',ex:'「要努力工作」這種話已經是老生常談，年輕人早就聽膩了。',exen:'\'Work hard\' — that\'s such a cliché, young people are sick of hearing it.',src:'class',tags:'idiom'},
  {h:'起伏',p:'qǐfú',b:'ㄑㄧˇ ㄈㄨˊ',e:'rise and fall; ups and downs',con:'neu',reg:'cas',freq:'high',ety:'起(qǐ) rise + 伏(fú) fall/bow down. Rising and falling — the natural rhythm of ups and downs.',comp:'起(qǐ rise) + 伏(fú fall/bow)',ex:'她的職涯有很多起伏，但每次低潮都讓她變得更強。',exen:'Her career has had many ups and downs, but every low point made her stronger.',src:'class',tags:''},
  {h:'情緒價值',p:'qíngxù jiàzhí',b:'ㄑㄧㄥˊ ㄒㄩˋ ㄐㄧㄚˋ ㄓˊ',e:'emotional value; the emotional support or comfort someone provides',con:'pos',reg:'cas',freq:'high',ety:'情緒(qíngxù) emotion + 價值(jiàzhí) value. The value derived from emotional connection — a modern term for the worth of emotional support in relationships.',comp:'情緒(qíngxù emotion) + 價值(jiàzhí value)',ex:'他工作能力很普通，但情緒價值超高，朋友有事都找他聊。',exen:'He\'s average professionally but his emotional value is through the roof — friends always go to him when they need to talk.',src:'class',tags:'slang'},
  {h:'進取心',p:'jìnqǔxīn',b:'ㄐㄧㄣˋ ㄑㄩˇ ㄒㄧㄣ',e:'ambition; enterprising spirit; drive to advance',con:'pos',reg:'for',freq:'high',ety:'進取(jìnqǔ) advance and take + 心(xīn) heart. The heart that advances and takes — the drive to keep pushing forward.',comp:'進(jìn advance) + 取(qǔ take/obtain) + 心(xīn heart)',ex:'面試官說她最欣賞有進取心的候選人，不怕失敗敢於嘗試。',exen:'The interviewer said she most admires candidates with drive — those who aren\'t afraid to fail and dare to try.',src:'class',tags:'business'},
  {h:'個人品牌',p:'gèrén pǐnpái',b:'ㄍㄜˋ ㄖㄣˊ ㄆㄧㄣˇ ㄆㄞˊ',e:'personal brand',con:'pos',reg:'for',freq:'high',ety:'個人(gèrén) personal/individual + 品牌(pǐnpái) brand. The brand of an individual person — how you present and market yourself.',comp:'個人(gèrén individual) + 品(pǐn quality/product) + 牌(pái brand/sign)',ex:'在社群媒體時代，經營個人品牌是職涯發展的重要策略。',exen:'In the social media era, building a personal brand is an important career strategy.',src:'class',tags:'business'},
  {h:'甜言蜜語',p:'tiányán mìyǔ',b:'ㄊㄧㄢˊ ㄧㄢˊ ㄇㄧˋ ㄩˇ',e:'sweet talk; flattery; honeyed words',con:'neg',reg:'cas',freq:'high',ety:'甜(tián) sweet + 言(yán) words + 蜜(mì) honey + 語(yǔ language. Sweet words and honey language — flattery that sounds good but may be insincere.',comp:'甜(tián sweet) + 言(yán words) + 蜜(mì honey) + 語(yǔ speech)',ex:'他很會說甜言蜜語，但行動上從來沒有跟上。',exen:'He\'s great at sweet talk but his actions never follow through.',src:'class',tags:'idiom'},
  {h:'忠誠',p:'zhōngchéng',b:'ㄓㄨㄥ ㄔㄥˊ',e:'loyal; loyalty; faithful',con:'pos',reg:'for',freq:'high',ety:'忠(zhōng) loyal/devoted + 誠(chéng) sincere/honest. Loyal and sincere — faithful devotion.',comp:'忠(zhōng loyal/devoted) + 誠(chéng sincere)',ex:'她對公司非常忠誠，即使有更好的機會也沒有跳槽。',exen:'She\'s extremely loyal to the company — even when better opportunities came along she didn\'t leave.',src:'class',tags:''},
  {h:'轉換跑道',p:'zhuǎnhuàn pǎodào',b:'ㄓㄨㄢˇ ㄏㄨㄢˋ ㄆㄠˇ ㄉㄠˋ',e:'career pivot; to switch tracks; change direction',con:'neu',reg:'cas',freq:'high',ety:'轉換(zhuǎnhuàn) switch/change + 跑道(pǎodào) running track/runway. Switching to a different track — a career change or pivot.',comp:'轉(zhuǎn turn) + 換(huàn switch) + 跑(pǎo run) + 道(dào track/path)',ex:'她在三十歲決定轉換跑道，從金融業轉到科技業。',exen:'She decided to pivot at thirty, switching from finance to tech.',src:'class',tags:'business'},
  {h:'良心',p:'liángxīn',b:'ㄌㄧㄤˊ ㄒㄧㄣ',e:'conscience; moral sense',con:'pos',reg:'cas',freq:'high',ety:'良(liáng) good/virtuous + 心(xīn) heart/mind. A good heart — conscience.',comp:'良(liáng good/virtuous) + 心(xīn heart)',ex:'她說她做不到，因為她有良心，不能欺騙顧客。',exen:'She said she couldn\'t do it — she has a conscience and can\'t deceive customers.',src:'class',tags:''},
  {h:'重回正軌',p:'chónghuí zhèngguǐ',b:'ㄔㄨㄥˊ ㄏㄨㄟˊ ㄓㄥˋ ㄍㄨㄟˇ',e:'to get back on track; to recover and return to the right path',con:'pos',reg:'for',freq:'high',ety:'重回(chónghuí) return again + 正軌(zhèngguǐ) correct track/rails. Getting back onto the right rails — recovering after a setback.',comp:'重(chóng again) + 回(huí return) + 正(zhèng correct) + 軌(guǐ track/rail)',ex:'休息了三個月後，她感覺自己終於重回正軌，準備好迎接新挑戰。',exen:'After three months of rest she finally felt back on track and ready for new challenges.',src:'class',tags:''},
  {h:'門檻',p:'ménkǎn',b:'ㄇㄣˊ ㄎㄢˇ',e:'barrier to entry; threshold; minimum requirement',con:'neg',reg:'for',freq:'high',ety:'門(mén) door/gate + 檻(kǎn sill/threshold). The threshold of a door — the minimum you must clear to enter.',comp:'門(mén door) + 檻(kǎn threshold/sill)',ex:'這個職位的門檻很高，要求至少五年相關工作經驗。',exen:'The barrier to entry for this position is very high — at least five years of relevant experience required.',src:'class',tags:'business'},
  {h:'雙面刃',p:'shuāngmiànrèn',b:'ㄕㄨㄤ ㄇㄧㄢˋ ㄖㄣˋ',e:'double-edged sword; something with both benefits and risks',con:'neu',reg:'cas',freq:'high',ety:'雙面(shuāngmiàn) double-sided + 刃(rèn blade. A blade with two sides — something that cuts both ways.',comp:'雙(shuāng double) + 面(miàn side/face) + 刃(rèn blade)',ex:'社群媒體是一把雙面刃，既能幫助品牌曝光，也可能引發公關危機。',exen:'Social media is a double-edged sword — it can boost brand visibility but also trigger PR crises.',src:'class',tags:''},
  {h:'執著',p:'zhízhuó',b:'ㄓˊ ㄓㄨㄛˊ',e:'persistent; attached to something; stubborn dedication',con:'neu',reg:'cas',freq:'high',ety:'執(zhí) hold/grasp + 著(zhuó) attached/stuck. Grasping and staying stuck — persistent attachment, which can be admirable or excessive depending on context.',comp:'執(zhí grasp/hold) + 著(zhuó attached)',ex:'她對這個夢想的執著讓很多人佩服，但也讓她付出了很大的代價。',exen:'Her persistence toward this dream earns admiration from many, but it\'s also cost her a great deal.',src:'class',tags:''},
  {h:'無頭蒼蠅',p:'wútóu cāngyíng',b:'ㄨˊ ㄊㄡˊ ㄘㄤ ㄧㄥˊ',e:'like a headless fly; flailing around without direction',con:'neg',reg:'cas',freq:'med',ety:'無頭(wútóu) headless + 蒼蠅(cāngyíng) housefly. A fly with no head — buzzing around frantically with no sense of direction.',comp:'無(wú without) + 頭(tóu head) + 蒼蠅(cāngyíng fly)',ex:'她第一次創業的時候像個無頭蒼蠅，完全不知道從哪裡開始。',exen:'When she first started her business she was flailing around like a headless fly — no idea where to begin.',src:'class',tags:'idiom'},
  {h:'自律',p:'zìlǜ',b:'ㄗˋ ㄌㄩˋ',e:'self-discipline; self-regulation',con:'pos',reg:'cas',freq:'high',ety:'自(zì) self + 律(lǜ) rule/discipline. Self-ruled — the ability to govern your own behavior without external enforcement.',comp:'自(zì self) + 律(lǜ rule/discipline)',ex:'她的成功很大程度上來自於她極強的自律，每天早上五點起床運動。',exen:'Her success is largely due to her incredible self-discipline — waking up at 5am every day to exercise.',src:'class',tags:''},
  {h:'見面三分情',p:'jiànmiàn sānfēn qíng',b:'ㄐㄧㄢˋ ㄇㄧㄢˋ ㄙㄢ ㄈㄣ ㄑㄧㄥˊ',e:'face time earns goodwill; being present in person builds relationship',con:'pos',reg:'cas',freq:'med',ety:'見面(jiànmiàn) meeting in person + 三分(sānfēn) thirty percent + 情(qíng feeling/warmth. Meeting face to face generates thirty percent warmth — the value of physical presence in relationships.',comp:'見面(jiànmiàn meet in person) + 三分(sānfēn a portion) + 情(qíng warmth/feeling)',ex:'就算只是短暫的面對面，見面三分情，比傳訊息有效多了。',exen:'Even a brief in-person meeting does more than messaging — face time builds goodwill.',src:'class',tags:'idiom'},
  {h:'驚弓之鳥',p:'jīnggōng zhī niǎo',b:'ㄐㄧㄥ ㄍㄨㄥ ㄓ ㄋㄧㄠˇ',e:'a bird startled by the bow; someone traumatized and overly cautious',con:'neg',reg:'for',freq:'med',ety:'A bird previously shot by an arrow becomes so traumatized that even the sound of a bow string makes it fall from the sky in panic. Describes someone so scarred by past experience they overreact to small things.',comp:'驚(jīng startled) + 弓(gōng bow) + 鳥(niǎo bird)',ex:'被騙過一次之後，她變得像驚弓之鳥，對任何陌生人都保持警戒。',exen:'After being deceived once, she became like a startled bird — guarded around any stranger.',src:'class',tags:'idiom'},
  {h:'看人下菜',p:'kàn rén xià cài',b:'ㄎㄢˋ ㄖㄣˊ ㄒㄧㄚˋ ㄘㄞˋ',e:'to adjust your treatment based on who someone is; to play favorites',con:'neg',reg:'cas',freq:'high',ety:'看人(kàn rén) look at the person + 下菜(xià cài) serve the dish. Choosing which dish to serve based on who the diner is — treating people differently based on their status.',comp:'看(kàn look at) + 人(rén person) + 下(xià serve) + 菜(cài dish)',ex:'她很討厭那個同事，因為他明顯地看人下菜，對上司特別客氣。',exen:'She can\'t stand that colleague — he obviously plays favorites, being especially nice to superiors.',src:'class',tags:'idiom'},
  {h:'絕招',p:'juézhāo',b:'ㄐㄩㄝˊ ㄓㄠ',e:'unique skill; killer move; a trick no one else has',con:'pos',reg:'cas',freq:'med',ety:'絕(jué) unmatched/ultimate + 招(zhāo) move/technique. An ultimate technique — a skill so good it sets you apart.',comp:'絕(jué ultimate/unmatched) + 招(zhāo move/technique)',ex:'她的絕招是能在十分鐘內把複雜的數據整理成一頁清晰的摘要。',exen:'Her killer skill is being able to organize complex data into one clear one-page summary in ten minutes.',src:'class',tags:''},
  {h:'背書',p:'bèishū',b:'ㄅㄟˋ ㄕㄨ',e:'to endorse; to back someone up; to vouch for',con:'pos',reg:'for',freq:'high',ety:'Originally meant memorizing a book (背 recite + 書 book). Now means endorsing — literally putting your name on someone\'s back to support them.',comp:'背(bèi back/endorse) + 書(shū book/write)',ex:'有大公司的名字背書，她的新創公司一下子就獲得了投資人的信任。',exen:'With a big company\'s name behind her, her startup instantly gained investor trust.',src:'class',tags:'business'},
  {h:'佛教',p:'fójiào',b:'ㄈㄛˊ ㄐㄧㄠˋ',e:'Buddhism',con:'neu',reg:'for',freq:'med',ety:'佛(fó) Buddha + 教(jiào) teaching/religion. The teaching of Buddha.',comp:'佛(fó Buddha) + 教(jiào teaching/religion)',ex:'她從小在佛教家庭長大，對因果和輪迴有很深的信仰。',exen:'She grew up in a Buddhist family and has a deep belief in karma and reincarnation.',src:'class',tags:'culture'},
  {h:'聖經',p:'shèngjīng',b:'ㄕㄥˋ ㄐㄧㄥ',e:'the Bible; holy scripture',con:'neu',reg:'for',freq:'med',ety:'聖(shèng) holy/sacred + 經(jīng) scripture/classic text. Holy scripture.',comp:'聖(shèng holy) + 經(jīng scripture/classic)',ex:'她奶奶每天早上都讀聖經，是虔誠的基督徒。',exen:'Her grandmother reads the Bible every morning — she\'s a devout Christian.',src:'class',tags:'culture'},
  {h:'聯邦',p:'liánbāng',b:'ㄌㄧㄢˊ ㄅㄤ',e:'federal; federation',con:'neu',reg:'for',freq:'med',ety:'聯(lián) connect/join + 邦(bāng) state/nation. Connected states — a federation.',comp:'聯(lián connect) + 邦(bāng state/nation)',ex:'美國是一個聯邦制國家，各州有一定程度的自治權。',exen:'The United States is a federal country — each state has a degree of autonomy.',src:'class',tags:''},
  {h:'指控性',p:'zhǐkòngxìng',b:'ㄓˇ ㄎㄨㄥˋ ㄒㄧㄥˋ',e:'accusatory; having the quality of making accusations',con:'neg',reg:'for',freq:'low',ety:'指控(zhǐkòng) accuse/charge + 性(xìng nature/quality. The quality of making accusations — accusatory in tone.',comp:'指(zhǐ point at) + 控(kòng accuse/control) + 性(xìng nature)',ex:'她說話的方式太指控性，讓對方馬上變得防衛。',exen:'The way she spoke was too accusatory — it immediately put the other person on the defensive.',src:'class',tags:''},
  {h:'探索',p:'tànsuǒ',b:'ㄊㄢˋ ㄙㄨㄛˇ',e:'to explore; to investigate; to search out',con:'pos',reg:'cas',freq:'high',ety:'探(tàn) probe/explore + 索(suǒ) search/seek. Probing and searching — exploration.',comp:'探(tàn probe/explore) + 索(suǒ search/seek)',ex:'她用了一年時間探索自己真正的興趣，最後決定轉職。',exen:'She spent a year exploring what she was truly interested in and ultimately decided to change careers.',src:'class',tags:''},
  {h:'先下手為強',p:'xiān xià shǒu wéi qiáng',b:'ㄒㄧㄢ ㄒㄧㄚˋ ㄕㄡˇ ㄨㄟˊ ㄑㄧㄤˊ',e:'the first to act has the advantage; strike first to get ahead',con:'pos',reg:'cas',freq:'med',ety:'先(xiān) first + 下手(xià shǒu) put your hand down/act + 為強(wéi qiáng) be the stronger. The one who moves first is stronger — acting preemptively gives you the advantage.',comp:'先(xiān first) + 下手(xià shǒu act first) + 為(wéi be) + 強(qiáng strong)',ex:'市場機會不等人，先下手為強，等別人都進場就太晚了。',exen:'Market opportunities don\'t wait — strike first to get ahead, by the time everyone else moves in it\'s too late.',src:'class',tags:'idiom business'},
  {h:'因人而異',p:'yīn rén ér yì',b:'ㄧㄣ ㄖㄣˊ ㄦˊ ㄧˋ',e:'varies from person to person; depends on the individual',con:'neu',reg:'for',freq:'high',ety:'因人(yīn rén) because of the person + 而異(ér yì) differ accordingly. Differing because of the person — individual variation.',comp:'因(yīn because of) + 人(rén person) + 而(ér and thus) + 異(yì differ)',ex:'學習的效果因人而異，找到適合自己的方式最重要。',exen:'Learning outcomes vary from person to person — finding what works for you is most important.',src:'class',tags:'connector'},
  {h:'進化',p:'jìnhuà',b:'ㄐㄧㄣˋ ㄏㄨㄚˋ',e:'to evolve; evolution; to level up',con:'pos',reg:'cas',freq:'high',ety:'進(jìn) advance + 化(huà) transform. Advancing transformation — evolution or leveling up.',comp:'進(jìn advance) + 化(huà transform)',ex:'她說自己這幾年進化了很多，以前根本不敢在大家面前說話。',exen:'She says she\'s evolved a lot these past few years — she used to be terrified to speak in front of people.',src:'class',tags:''},
  {h:'平靜',p:'píngjìng',b:'ㄆㄧㄥˊ ㄐㄧㄥˋ',e:'calm; tranquil; peaceful',con:'pos',reg:'cas',freq:'high',ety:'平(píng) flat/level + 靜(jìng) quiet/still. Flat and still — calm and tranquil.',comp:'平(píng flat/level) + 靜(jìng quiet/still)',ex:'她深呼吸了幾次，讓自己平靜下來，才開始回應對方的指責。',exen:'She took a few deep breaths to calm herself before responding to the accusations.',src:'class',tags:''},
  {h:'自覺',p:'zìjué',b:'ㄗˋ ㄐㄩㄝˊ',e:'self-awareness; to be consciously aware',con:'pos',reg:'for',freq:'high',ety:'自(zì) self + 覺(jué) aware/sense. Self-awareness — the ability to observe and understand your own thoughts and behaviors.',comp:'自(zì self) + 覺(jué aware/sense)',ex:'高自覺的人能更快發現自己的盲點，做出更好的決策。',exen:'People with high self-awareness can identify their blind spots faster and make better decisions.',src:'class',tags:'psychology'},
  {h:'顧左右而言他',p:'gù zuǒyòu ér yán tā',b:'ㄍㄨˋ ㄗㄨㄛˇ ㄧㄡˋ ㄦˊ ㄧㄢˊ ㄊㄚ',e:'to dodge the question; to change the subject; to talk around it',con:'neg',reg:'for',freq:'med',ety:'顧左右(gù zuǒyòu) look left and right + 而(ér and then) + 言他(yán tā) talk about something else. Looking around the room while talking about something completely different — classic subject-dodging.',comp:'顧(gù look at) + 左右(zuǒyòu left and right) + 言(yán speak) + 他(tā other things)',ex:'每次問他這個問題，他都顧左右而言他，從來沒有直接回答過。',exen:'Every time this question comes up he dodges it — he\'s never given a straight answer.',src:'class',tags:'idiom'},
  {h:'波瀾不驚',p:'bōlán bùjīng',b:'ㄅㄛ ㄌㄢˊ ㄅㄨˋ ㄐㄧㄥ',e:'unruffled by waves; nothing phases you; composure under pressure',con:'pos',reg:'for',freq:'med',ety:'波瀾(bōlán) waves and ripples + 不驚(bùjīng) not startled. Waves that don\'t startle you — unshakeable composure.',comp:'波(bō wave) + 瀾(lán surge) + 不(bù not) + 驚(jīng startled)',ex:'她面對再大的危機都波瀾不驚，讓團隊非常信任她。',exen:'No matter how big the crisis, she stays unruffled — it makes the team trust her completely.',src:'class',tags:'idiom'},
  {h:'上緊發條',p:'shàngjǐn fātiáo',b:'ㄕㄤˋ ㄐㄧㄣˇ ㄈㄚ ㄊㄧㄠˊ',e:'always \'on\'; tightly wound; running at full tension',con:'neg',reg:'cas',freq:'med',ety:'上緊(shàngjǐn) wind tight + 發條(fātiáo) spring mechanism. Winding the spring too tight — the feeling of being perpetually tense and switched on, never able to rest.',comp:'上(shàng up/wind) + 緊(jǐn tight) + 發條(fātiáo spring/clockwork)',ex:'她最近一直上緊發條，連週末都在回工作訊息。',exen:'She\'s been wound up tight lately — she\'s even responding to work messages on weekends.',src:'class',tags:''},
  {h:'共鳴',p:'gòngmíng',b:'ㄍㄨㄥˋ ㄇㄧㄥˊ',e:'resonance; to resonate with; emotional connection',con:'pos',reg:'cas',freq:'high',ety:'共(gòng) together/shared + 鳴(míng) sound/ring. Ringing together — when something resonates deeply with you, like two strings vibrating at the same frequency.',comp:'共(gòng together/shared) + 鳴(míng sound/resonate)',ex:'她的演講引起了很多人的共鳴，社群媒體上大家都在分享。',exen:'Her speech resonated deeply with a lot of people — everyone was sharing it on social media.',src:'class',tags:''},
  {h:'前所未有',p:'qián suǒ wèi yǒu',b:'ㄑㄧㄢˊ ㄙㄨㄛˇ ㄨㄟˋ ㄧㄡˇ',e:'unprecedented; never seen before',con:'pos',reg:'for',freq:'high',ety:'前所(qián suǒ) in what has come before + 未有(wèi yǒu) has not existed. Something that has never existed before — unprecedented.',comp:'前(qián before/previous) + 所(suǒ what) + 未(wèi not yet) + 有(yǒu exist)',ex:'AI的發展速度是前所未有的，整個產業都在重新定位。',exen:'The speed of AI development is unprecedented — the entire industry is repositioning itself.',src:'class',tags:''},
  {h:'思維',p:'sīwéi',b:'ㄙ ㄨㄟˊ',e:'mindset; way of thinking; mentality',con:'neu',reg:'for',freq:'high',ety:'思(sī) think + 維(wéi) maintain/connect. The threads of thought that connect — a way of thinking or mindset.',comp:'思(sī think) + 維(wéi connect/maintain)',ex:'創業需要的不只是技能，更需要轉換思維，用不同的角度看問題。',exen:'Entrepreneurship requires more than skills — you need to shift your mindset and see problems from different angles.',src:'class',tags:''},
  {h:'雷聲大雨點小',p:'léishēng dà yǔdiǎn xiǎo',b:'ㄌㄟˊ ㄕㄥ ㄉㄚˋ ㄩˇ ㄉㄧㄢˇ ㄒㄧㄠˇ',e:'all talk no action; much noise little result; big thunder small rain',con:'neg',reg:'cas',freq:'high',ety:'雷聲大(léishēng dà) thunder loud + 雨點小(yǔdiǎn xiǎo) raindrops small. Lots of thunder but tiny raindrops — when the announcement is much bigger than the actual delivery.',comp:'雷(léi thunder) + 聲(shēng sound) + 雨(yǔ rain) + 點(diǎn drops)',ex:'這個政策公布時轟轟烈烈，結果雷聲大雨點小，沒什麼實質影響。',exen:'The policy was announced with great fanfare but turned out to be all thunder and no rain — no real impact.',src:'class',tags:'idiom'},
  {h:'凡走過必留下痕跡',p:'fán zǒuguò bì liúxià hénjī',b:'ㄈㄢˊ ㄗㄡˇ ㄍㄨㄛˋ ㄅㄧˋ ㄌㄧㄡˊ ㄒㄧㄚˋ ㄏㄣˊ ㄐㄧ',e:'everywhere you go you leave traces; your actions always leave a mark',con:'neu',reg:'for',freq:'med',ety:'凡(fán) wherever/all + 走過(zǒuguò) passed through + 必(bì) certainly + 留下(liúxià) leave behind + 痕跡(hénjī) traces/marks. Wherever you\'ve been, traces are always left — used for accountability, legacy, and digital footprints.',comp:'凡(fán wherever) + 走過(zǒuguò pass through) + 留下(liúxià leave) + 痕跡(hénjī traces)',ex:'在網路上的行為要謹慎，凡走過必留下痕跡。',exen:'Be careful about your behavior online — everywhere you go leaves traces.',src:'class',tags:'idiom'},
  {h:'說話要看時機',p:'shuōhuà yào kàn shíjī',b:'ㄕㄨㄛ ㄏㄨㄚˋ ㄧㄠˋ ㄎㄢˋ ㄕˊ ㄐㄧ',e:'timing matters when speaking; pick the right moment to say something',con:'pos',reg:'cas',freq:'med',ety:'說話(shuōhuà) speaking + 要(yào) must + 看時機(kàn shíjī) read the timing. A practical wisdom about communication — what you say matters less than when you say it.',comp:'說話(shuōhuà speak) + 看(kàn read/observe) + 時機(shíjī timing/moment)',ex:'她有話直說，但她老闆提醒她說話要看時機，否則效果適得其反。',exen:'She speaks her mind directly, but her boss reminded her that timing matters — otherwise it backfires.',src:'class',tags:''},
  {h:'集體主義',p:'jítǐ zhǔyì',b:'ㄐㄧˊ ㄊㄧˇ ㄓㄨˇ ㄧˋ',e:'collectivism; prioritizing the group over the individual',con:'neu',reg:'for',freq:'med',ety:'集體(jítǐ) collective/group + 主義(zhǔyì) -ism. The ideology of the collective — prioritizing group harmony and needs over individual desires.',comp:'集體(jítǐ collective) + 主義(zhǔyì ideology/-ism)',ex:'東亞社會普遍有集體主義的文化，強調和諧與群體利益。',exen:'East Asian societies generally have collectivist cultures that emphasize harmony and group interests.',src:'class',tags:''},
  {h:'入境隨俗',p:'rùjìng suísú',b:'ㄖㄨˋ ㄐㄧㄥˋ ㄙㄨㄟˊ ㄙㄨˊ',e:'when in Rome do as the Romans do; adapt to local customs',con:'pos',reg:'for',freq:'high',ety:'入境(rùjìng) enter the territory + 隨俗(suísú) follow the customs. When you enter a place, follow its customs — cultural adaptability.',comp:'入(rù enter) + 境(jìng territory/place) + 隨(suí follow) + 俗(sú custom/practice)',ex:'她到日本工作後，很快學會了入境隨俗，適應當地的職場文化。',exen:'After moving to Japan for work she quickly learned to adapt — following local workplace customs.',src:'class',tags:'idiom'},
  {h:'職業倦怠',p:'zhíyè juàndài',b:'ㄓˊ ㄧㄝˋ ㄐㄩㄢˋ ㄉㄞˋ',e:'burnout; career exhaustion; professional fatigue',con:'neg',reg:'for',freq:'high',ety:'職業(zhíyè) career/profession + 倦怠(juàndài) fatigue/weariness. Career weariness — burnout from sustained professional demands.',comp:'職業(zhíyè career) + 倦(juàn weary) + 怠(dài lazy/slack)',ex:'她連續工作了三年沒有休假，終於出現了職業倦怠的症狀。',exen:'After three years of working without a vacation she finally started showing symptoms of burnout.',src:'class',tags:'business'},
  {h:'照單全收',p:'zhào dān quán shōu',b:'ㄓㄠˋ ㄉㄢ ㄑㄩㄢˊ ㄕㄡ',e:'to accept everything without question; to say yes to everything',con:'neg',reg:'cas',freq:'high',ety:'照單(zhào dān) according to the list + 全收(quán shōu) accept everything. Taking everything on the list without filtering — accepting all demands without pushback.',comp:'照(zhào according to) + 單(dān list) + 全(quán all) + 收(shōu receive/accept)',ex:'新人往往照單全收，不敢拒絕任何任務，但這樣很快就會burnout。',exen:'New employees tend to accept everything without question, afraid to say no — but this leads to burnout quickly.',src:'class',tags:''},
  {h:'大開眼界',p:'dà kāi yǎnjiè',b:'ㄉㄚˋ ㄎㄞ ㄧㄢˇ ㄐㄧㄝˋ',e:'eye-opening; to broaden your horizons',con:'pos',reg:'cas',freq:'high',ety:'大(dà) greatly + 開(kāi) open + 眼界(yǎnjiè) field of vision/horizons. Greatly opening your field of vision — having your eyes opened wide.',comp:'大(dà greatly) + 開(kāi open) + 眼(yǎn eye) + 界(jiè boundary/world)',ex:'第一次去東南亞旅行讓她大開眼界，發現世界比她想像的更多元。',exen:'Her first trip to Southeast Asia was eye-opening — she discovered the world was more diverse than she\'d imagined.',src:'class',tags:'idiom'},
  {h:'求好心切',p:'qiú hǎo xīnqiè',b:'ㄑㄧㄡˊ ㄏㄠˇ ㄒㄧㄣ ㄑㄧㄝˋ',e:'eager to do well; overly perfectionistic; the anxiety of wanting to be good',con:'neg',reg:'cas',freq:'med',ety:'求好(qiú hǎo) strive for excellence + 心切(xīnqiè) urgently/with an anxious heart. An urgent heart striving for perfection — trying so hard to do well that you create anxiety and mistakes.',comp:'求(qiú seek) + 好(hǎo good/excellent) + 心(xīn heart) + 切(qiè urgent/eager)',ex:'她求好心切，反而越改越亂，最後什麼都沒完成。',exen:'She was so eager to do everything perfectly that the more she revised the messier it got — nothing got finished.',src:'class',tags:''},
  {h:'菁英',p:'jīngyīng',b:'ㄐㄧㄥ ㄧㄥ',e:'elite; the cream of the crop',con:'pos',reg:'for',freq:'high',ety:'菁(jīng) the essence/best part of a plant + 英(yīng) outstanding/heroic. The flowering essence — the elite.',comp:'菁(jīng essence/best) + 英(yīng outstanding/heroic)',ex:'她進入了一個菁英雲集的行業，壓力很大但也非常有刺激感。',exen:'She entered an industry full of elites — enormous pressure but also very stimulating.',src:'class',tags:''},
  {h:'寓言',p:'yùyán',b:'ㄩˋ ㄧㄢˊ',e:'fable; parable; allegorical story',con:'neu',reg:'for',freq:'med',ety:'寓(yù) lodge/imply + 言(yán) words/story. Words with a hidden lodging — a story that carries a deeper meaning.',comp:'寓(yù imply/lodge) + 言(yán words/story)',ex:'《龜兔賽跑》是一個有名的寓言，告訴我們不能驕傲大意。',exen:'The Tortoise and the Hare is a famous fable that teaches us not to be arrogant and careless.',src:'class',tags:''},
  {h:'生活瑣事',p:'shēnghuó suǒshì',b:'ㄕㄥ ㄏㄨㄛˊ ㄙㄨㄛˇ ㄕˋ',e:'life admin; mundane daily tasks; the little things of life',con:'neg',reg:'cas',freq:'high',ety:'生活(shēnghuó) daily life + 瑣事(suǒshì) trivial matters. The trivial matters of daily life — all the small things that need to get done.',comp:'生活(shēnghuó life) + 瑣(suǒ trivial/fragmentary) + 事(shì matter/task)',ex:'搬家之後有太多生活瑣事要處理，光是設定水電就花了一個下午。',exen:'After moving there was so much life admin to deal with — just setting up utilities took an entire afternoon.',src:'class',tags:''},
  {h:'性騷擾',p:'xìng sāorǎo',b:'ㄒㄧㄥˋ ㄙㄠ ㄖㄠˇ',e:'sexual harassment',con:'neg',reg:'for',freq:'high',ety:'性(xìng) sexual/gender + 騷擾(sāorǎo) harass/disturb. Sexual disturbance — sexual harassment.',comp:'性(xìng sexual) + 騷(sāo disturb) + 擾(rǎo harass)',ex:'她鼓起勇氣舉報了職場性騷擾，引起了很大的社會討論。',exen:'She found the courage to report workplace sexual harassment — it sparked major public discussion.',src:'class',tags:''},
  {h:'來源',p:'láiyuán',b:'ㄌㄞˊ ㄩㄢˊ',e:'source; origin; where something comes from',con:'neu',reg:'for',freq:'high',ety:'來(lái) come + 源(yuán) source/origin. Where it comes from — the source or origin.',comp:'來(lái come) + 源(yuán source/origin)',ex:'這份報告的數據來源是政府的官方統計，可信度很高。',exen:'The data in this report comes from official government statistics — it\'s very reliable.',src:'class',tags:'business'},
  {h:'分心',p:'fēnxīn',b:'ㄈㄣ ㄒㄧㄣ',e:'to be distracted; to lose focus',con:'neg',reg:'cas',freq:'high',ety:'分(fēn) divide/split + 心(xīn) heart/attention. A split heart — divided attention.',comp:'分(fēn divide) + 心(xīn heart/attention)',ex:'她很容易分心，在咖啡廳工作比在家效率高很多。',exen:'She gets distracted easily — working in a coffee shop is much more productive than working from home.',src:'class',tags:''},
  {h:'瞎忙',p:'xiāmáng',b:'ㄒㄧㄚ ㄇㄤˊ',e:'blindly busy; busy for no good reason; spinning wheels',con:'neg',reg:'cas',freq:'high',ety:'瞎(xiā) blind + 忙(máng) busy. Blind busyness — running around doing things without any clear purpose or result.',comp:'瞎(xiā blind) + 忙(máng busy)',ex:'她這一週瞎忙了五天，做了很多事情，卻沒有一件真正重要的。',exen:'She spent five days this week blindly busy — lots of activity but nothing that actually mattered.',src:'class',tags:'slang'},
  {h:'雷區',p:'léiqū',b:'ㄌㄟˊ ㄑㄩ',e:'minefield; sensitive topic; a subject that triggers someone',con:'neg',reg:'cas',freq:'high',ety:'雷(léi) mine/explosive device + 區(qū) zone/area. A minefield zone — topics or behaviors that trigger a strong negative reaction.',comp:'雷(léi landmine) + 區(qū zone/area)',ex:'跟她聊天要小心，她的前任是個大雷區，千萬不要提。',exen:'Be careful when talking to her — her ex is a major minefield, whatever you do don\'t bring him up.',src:'class',tags:'slang'},
  {h:'立flag',p:'lì flag',b:'ㄌㄧˋ flag',e:'to jinx yourself; to call your own failure in advance; to flag',con:'neg',reg:'cas',freq:'med',ety:'Internet slang. 立(lì) set up/plant + flag (English). Planting a flag that marks your future downfall — like saying \'nothing can go wrong\' right before everything goes wrong.',comp:'立(lì plant/set up) + flag (旗幟 marker)',ex:'他說「這個報告應該很簡單」，真的是在立flag，後來改了十次。',exen:'He said \'this report should be simple\' — total jinx, he ended up revising it ten times.',src:'class',tags:'slang'},
  {h:'抒發',p:'shūfā',b:'ㄕㄨ ㄈㄚ',e:'to express feelings; to vent; to give voice to emotions',con:'pos',reg:'cas',freq:'high',ety:'抒(shū) express/pour out + 發(fā) emit/release. Pouring out and releasing — expressing emotions.',comp:'抒(shū express/pour out) + 發(fā emit/release)',ex:'寫日記對她來說是一種抒發情緒的方式，讓她感覺輕鬆一些。',exen:'Keeping a journal is a way for her to express her emotions — it makes her feel a little lighter.',src:'class',tags:''},
  {h:'心如止水',p:'xīn rú zhǐ shuǐ',b:'ㄒㄧㄣ ㄖㄨˊ ㄓˇ ㄕㄨㄟˇ',e:'calm and at peace; heart like still water',con:'pos',reg:'for',freq:'med',ety:'心(xīn) heart + 如(rú) like + 止水(zhǐ shuǐ) still water. A heart like still water — the deepest kind of calm, undisturbed by external turbulence.',comp:'心(xīn heart) + 如(rú like) + 止(zhǐ still/stop) + 水(shuǐ water)',ex:'禪修了幾年後，她能做到心如止水，不再被小事影響。',exen:'After years of meditation she can achieve true stillness — minor things no longer affect her.',src:'class',tags:'idiom'},
  {h:'募款',p:'mùkuǎn',b:'ㄇㄨˋ ㄎㄨㄢˇ',e:'fundraising; to raise funds',con:'neu',reg:'for',freq:'med',ety:'募(mù) recruit/gather + 款(kuǎn) funds/money. Gathering funds — fundraising.',comp:'募(mù recruit/gather) + 款(kuǎn funds/money)',ex:'她花了半年時間募款，終於為公益計畫籌到了足夠的資金。',exen:'She spent six months fundraising and finally raised enough money for the public welfare project.',src:'class',tags:'business'},
  {h:'理財',p:'lǐcái',b:'ㄌㄧˇ ㄘㄞˊ',e:'financial planning; money management',con:'pos',reg:'cas',freq:'high',ety:'理(lǐ) manage/organize + 財(cái) wealth/money. Managing your wealth — financial planning.',comp:'理(lǐ manage) + 財(cái wealth/money)',ex:'她從大學就開始學理財，現在存款比同年齡的人多很多。',exen:'She started learning financial planning in college — her savings are now much higher than peers her age.',src:'class',tags:'business'},

// ─── SM-2 LOGIC ──────────────────────────────────────────────────────────────
function getSM2(id) {
  try {
    const d = JSON.parse(localStorage.getItem('sm2_' + id) || 'null');
    return d || { reps: 0, ef: 2.5, interval: 0, nextReview: 0 };
  } catch(e) { return { reps: 0, ef: 2.5, interval: 0, nextReview: 0 }; }
}

function saveSM2(id, data) {
  try { localStorage.setItem('sm2_' + id, JSON.stringify(data)); } catch(e) {}
}

function updateSM2(id, grade) {
  // grade: 0=Again, 1=Hard, 2=Good, 3=Easy (maps to q: 1,3,4,5)
  const q = [1,3,4,5][grade];
  let d = getSM2(id);
  if (q < 3) {
    d.reps = 0; d.interval = 1;
  } else {
    if (d.reps === 0) d.interval = 1;
    else if (d.reps === 1) d.interval = 6;
    else d.interval = Math.round(d.interval * d.ef);
    d.reps++;
    d.ef = Math.max(1.3, d.ef + 0.1 - (5-q)*(0.08 + (5-q)*0.02));
  }
  d.nextReview = Date.now() + d.interval * 86400000;
  saveSM2(id, d);
  return d;
}

function isDue(id) {
  const d = getSM2(id);
  return d.nextReview === 0 || Date.now() >= d.nextReview;
}

function wordId(w) {
  return w.h.replace(/[^a-zA-Z\u4e00-\u9fff]/g,'');
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let allWords = [];
let activeFilter = 'all';
let currentTab = 'browse';
let quizQueue = [];
let quizIndex = 0;
let quizFlipped = false;
let quizStats = { again: 0, hard: 0, good: 0, easy: 0 };
let openWord = null;

// ─── LOAD DATA ───────────────────────────────────────────────────────────────
async function loadData() {
  showSync('載入中...', false);
  allWords = [...BUILTIN];

  try {
    const resp = await fetch(SHEET_URL + '&t=' + Date.now());
    if (resp.ok) {
      const text = await resp.text();
      const rows = parseCSV(text);
      if (rows.length > 1) {
        const headers = rows[0].map(h => h.trim().toLowerCase());
        const sheetWords = rows.slice(1).filter(r => r[0] && r[0].trim()).map(r => {
          const w = {};
          headers.forEach((h,i) => w[h] = (r[i]||'').trim());
          return { h:w.hanzi, p:w.pinyin, b:w.bopomofo, e:w.english,
            con:w.connotation, reg:w.register, freq:w.frequency,
            ety:w.etymology, comp:w.components, ex:w.example,
            exen:w.exampleenglish||'', src:w.source, tags:w.tags||'' };
        });
        // merge: sheet words override built-in by hanzi
        const builtinMap = new Map(BUILTIN.map(w => [w.h, w]));
        sheetWords.forEach(w => builtinMap.set(w.h, w));
        allWords = Array.from(builtinMap.values());
        showSync('✓ 已同步 Google Sheets (' + sheetWords.length + ' 個新詞)', false);
        setTimeout(() => hideSync(), 3000);
      } else { hideSync(); }
    } else { hideSync(); }
  } catch(e) { hideSync(); }

  updateHeader();
  updateDueBadge();
  renderBrowse();
}

function parseCSV(text) {
  const rows = []; let row = []; let cell = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { if (inQ && text[i+1]==='"') { cell+='"'; i++; } else inQ=!inQ; }
    else if (c === ',' && !inQ) { row.push(cell); cell=''; }
    else if ((c==='\n'||c==='\r') && !inQ) {
      if (c==='\r'&&text[i+1]==='\n') i++;
      row.push(cell); rows.push(row); row=[]; cell='';
    } else cell+=c;
  }
  if (cell||row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function showSync(msg, isError) {
  const bar = document.getElementById('syncBar');
  bar.textContent = msg;
  bar.className = 'sync-bar show' + (isError?' error':'');
}
function hideSync() { document.getElementById('syncBar').className='sync-bar'; }

// ─── HEADER ──────────────────────────────────────────────────────────────────
function updateHeader() {
  const known = allWords.filter(w => getSM2(wordId(w)).reps > 0).length;
  const due = allWords.filter(w => isDue(wordId(w))).length;
  document.getElementById('headerStats').innerHTML =
    `<b>${allWords.length}</b> 個詞 · <b>${known}</b> 已學 · <b>${due}</b> 待複習`;
}

function updateDueBadge() {
  const due = allWords.filter(w => isDue(wordId(w))).length;
  const badge = document.getElementById('dueBadge');
  if (due > 0) { badge.textContent = due; badge.style.display='inline-block'; }
  else badge.style.display='none';
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['browse','quiz'][i]===tab));
  document.getElementById('browseTab').style.display = tab==='browse'?'block':'none';
  document.getElementById('quizTab').style.display = tab==='quiz'?'block':'none';
  if (tab==='quiz') startQuiz();
}

// ─── BROWSE ──────────────────────────────────────────────────────────────────
function renderBrowse() {
  const search = (document.getElementById('searchInput').value||'').toLowerCase();
  const normalSearch = search.replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g, c =>
    'aaaaeeeeiiiioooouu uu'['āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ'.indexOf(c)]||c);

  const filters = {
    all: () => true,
    due: w => isDue(wordId(w)),
    idiom: w => (w.tags||'').includes('idiom'),
    song: w => (w.tags||'').includes('song'),
    connector: w => (w.tags||'').includes('connector'),
    business: w => (w.tags||'').includes('business'),
    pattern: w => (w.tags||'').includes('pattern'),
    known: w => getSM2(wordId(w)).reps > 2,
    learning: w => { const d=getSM2(wordId(w)); return d.reps>0 && d.reps<=2; }
  };

  // Build filter buttons
  const filterDef = [
    {k:'all',label:'全部'},
    {k:'due',label:'📌 待複習'},
    {k:'idiom',label:'成語'},
    {k:'song',label:'🎵 歌曲'},
    {k:'connector',label:'🔗 連接詞'},
    {k:'pattern',label:'📐 語法'},
    {k:'business',label:'💼 商業'},
    {k:'known',label:'✓ 已學'},
    {k:'learning',label:'學習中'},
  ];
  const fContainer = document.getElementById('filterBtns');
  if (!fContainer.children.length) {
    filterDef.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (f.k===activeFilter?' active':'');
      btn.textContent = f.label;
      btn.onclick = () => { activeFilter=f.k; renderBrowse(); };
      fContainer.appendChild(btn);
    });
  } else {
    fContainer.querySelectorAll('.filter-btn').forEach((btn,i) => {
      btn.className='filter-btn'+(filterDef[i].k===activeFilter?' active':'');
    });
  }

  let words = allWords.filter(filters[activeFilter]||filters.all);
  if (search) {
    words = words.filter(w => {
      const pNorm = (w.p||'').toLowerCase().replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g,
        c=>'aaaaeeeeiiiioooouu uu'['āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ'.indexOf(c)]||c)
        .replace(/\s/g,'').replace(/[0-9]/g,'');
      return (w.h||'').includes(search) ||
             pNorm.includes(normalSearch.replace(/\s/g,'')) ||
             (w.e||'').toLowerCase().includes(search) ||
             (w.src||'').toLowerCase().includes(search);
    });
  }

  const grid = document.getElementById('wordGrid');
  if (!words.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big">🔍</div>找不到符合的詞</div>';
    return;
  }

  grid.innerHTML = '';
  words.forEach(w => {
    const id = wordId(w);
    const sm2 = getSM2(id);
    const isPattern = (w.tags||'').includes('pattern');
    const card = document.createElement('div');
    const statusClass = sm2.reps>2?'known':sm2.reps>0?'learning':'';
    card.className = 'word-card ' + statusClass + (isPattern?' pattern-card':'');
    card.onclick = () => openDrawer(w);

    const dotClass = sm2.nextReview===0?'sm2-new':isDue(id)?'sm2-due':'sm2-ok';

    let conBadge='';
    if(w.con==='pos') conBadge='<span class="badge badge-pos">正面</span>';
    else if(w.con==='neg') conBadge='<span class="badge badge-neg">負面</span>';

    let regBadge='';
    if(w.reg==='cas') regBadge='<span class="badge badge-cas">口語</span>';
    else if(w.reg==='for') regBadge='<span class="badge badge-for">正式</span>';
    else if(w.reg==='wri') regBadge='<span class="badge badge-wri">書面</span>';

    let srcBadge = w.src&&w.src.startsWith('song:')?
      `<span class="badge badge-src">🎵${w.src.replace('song:','')}</span>`:'';
    let freqBadge = w.freq==='high'?'<span class="badge badge-freq-high">⭐常用</span>':'';
    let connBadge = (w.tags||'').includes('connector')?'<span class="badge badge-conn">🔗</span>':'';
    let patternBadge = isPattern?'<span class="badge badge-conn">📐語法</span>':'';

    card.innerHTML = `
      <div class="sm2-indicator ${dotClass}"></div>
      <div class="${isPattern?'pattern-hanzi':'card-hanzi'}">${w.h}</div>
      <div class="card-pinyin">${w.p}</div>
      <div class="card-english">${w.e}</div>
      <div class="card-badges">${freqBadge}${conBadge}${regBadge}${connBadge}${patternBadge}${srcBadge}</div>
    `;
    grid.appendChild(card);
  });
}

// ─── DRAWER ──────────────────────────────────────────────────────────────────
function openDrawer(w) {
  openWord = w;
  const isPattern = (w.tags||'').includes('pattern');
  document.getElementById('drawerContent').innerHTML = `
    <div class="drawer-hanzi">${w.h}</div>
    <div class="drawer-pinyin">${w.p}</div>
    ${w.b?`<div class="drawer-bopomofo">${w.b}</div>`:''}
    <div class="drawer-english">${w.e}</div>
    ${w.h?`<button class="audio-btn" onclick="playAudio('${w.h}')">🔊 播放發音</button>`:''}
    ${w.ex?`
    <div class="drawer-section">
      <div class="drawer-label">例句</div>
      <div class="drawer-example">
        <div class="zh">${w.ex}</div>
        ${w.exen?`<div class="en">${w.exen}</div>`:''}
      </div>
    </div>`:''}
    ${!isPattern && w.ety?`
    <div class="drawer-section">
      <div class="drawer-label">為什麼這樣說</div>
      <div class="drawer-text">${w.ety}</div>
    </div>`:''}
    ${!isPattern && w.comp?`
    <div class="drawer-section">
      <div class="drawer-label">部首與組成</div>
      <div class="drawer-text">${w.comp}</div>
    </div>`:''}
    ${w.src?`
    <div class="drawer-section">
      <div class="drawer-label">來源</div>
      <div class="drawer-text">${w.src}</div>
    </div>`:''}
  `;
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer(e) {
  if (!e || e.target===document.getElementById('drawerOverlay')) {
    document.getElementById('drawerOverlay').classList.remove('open');
  }
}

function playAudio(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.85;
  const voices = speechSynthesis.getVoices();
  const tw = voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
  if(tw) u.voice=tw;
  speechSynthesis.speak(u);
}

// ─── QUIZ ────────────────────────────────────────────────────────────────────
function startQuiz() {
  // Sort: due words first, then by frequency
  const freqScore = {high:3, med:2, low:1};
  quizQueue = [...allWords].sort((a,b) => {
    const aDue = isDue(wordId(a)) ? 1 : 0;
    const bDue = isDue(wordId(b)) ? 1 : 0;
    if (aDue !== bDue) return bDue - aDue;
    return (freqScore[b.freq]||1) - (freqScore[a.freq]||1);
  });
  quizIndex = 0; quizFlipped = false;
  quizStats = { again:0, hard:0, good:0, easy:0 };
  renderQuiz();
}

function renderQuiz() {
  const c = document.getElementById('quizContainer');
  if (quizIndex >= Math.min(quizQueue.length, 20)) {
    renderQuizDone(); return;
  }
  const w = quizQueue[quizIndex];
  const isPattern = (w.tags||'').includes('pattern');
  const progress = quizIndex / Math.min(quizQueue.length, 20);

  c.innerHTML = `
    <div class="quiz-progress">
      <span>${quizIndex + 1} / ${Math.min(quizQueue.length, 20)}</span>
      <span style="color:#999;font-size:12px">${isDue(wordId(w))?'📌 待複習':'新詞'}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress*100}%"></div></div>
    <div class="quiz-card ${quizFlipped?'flipped':''}" id="quizCard" onclick="flipCard()">
      <div class="quiz-hanzi">${w.h}</div>
      ${isPattern?`<div style="font-size:13px;color:${quizFlipped?'rgba(255,255,255,0.6)':'#888'};margin-top:4px">語法模式</div>`:''}
      ${quizFlipped?`
      <div class="quiz-reveal">
        <div class="quiz-pinyin">${w.p}</div>
        <div class="quiz-english">${w.e}</div>
        ${w.src&&w.src.startsWith('song:')?`<div class="quiz-src">🎵 ${w.src.replace('song:','')}</div>`:''}
      </div>`:''}
      <div class="quiz-prompt">${quizFlipped?'評分：':'點擊翻轉'}</div>
    </div>
    ${quizFlipped?`
    <div class="sm2-buttons">
      <button class="sm2-btn sm2-again" onclick="rateCard(0)">又忘了</button>
      <button class="sm2-btn sm2-hard" onclick="rateCard(1)">很難</button>
      <button class="sm2-btn sm2-good" onclick="rateCard(2)">記得</button>
      <button class="sm2-btn sm2-easy" onclick="rateCard(3)">很熟</button>
    </div>
    <div class="sm2-labels">
      <span class="sm2-label">明天再看</span>
      <span class="sm2-label">幾天後</span>
      <span class="sm2-label">下週</span>
      <span class="sm2-label">更久後</span>
    </div>`:''}
    <div class="quiz-actions">
      ${quizFlipped?`<button class="quiz-action-btn" onclick="openDrawer(quizQueue[quizIndex])">深入 →</button>`:''}
      <button class="quiz-action-btn" onclick="skipCard()">跳過</button>
    </div>
  `;
}

function flipCard() {
  if (!quizFlipped) { quizFlipped=true; renderQuiz(); }
}

function rateCard(grade) {
  const w = quizQueue[quizIndex];
  updateSM2(wordId(w), grade);
  if(grade===0) quizStats.again++;
  else if(grade===1) quizStats.hard++;
  else if(grade===2) quizStats.good++;
  else quizStats.easy++;
  quizIndex++; quizFlipped=false;
  updateHeader(); updateDueBadge();
  renderQuiz();
}

function skipCard() {
  quizIndex++; quizFlipped=false; renderQuiz();
}

function renderQuizDone() {
  const c = document.getElementById('quizContainer');
  const total = quizStats.again+quizStats.hard+quizStats.good+quizStats.easy;
  const due = allWords.filter(w=>isDue(wordId(w))).length;
  c.innerHTML = `
    <div class="quiz-done">
      <div class="quiz-done-hanzi">好棒！</div>
      <h2>測驗完成</h2>
      <p>今天複習了 ${total} 個詞${due>0?`，還有 ${due} 個待複習`:'，全部都複習完了！'}</p>
      <div class="quiz-done-stats">
        <div class="done-stat"><div class="done-stat-num" style="color:#c62828">${quizStats.again}</div><div class="done-stat-label">又忘了</div></div>
        <div class="done-stat"><div class="done-stat-num" style="color:#e65100">${quizStats.hard}</div><div class="done-stat-label">很難</div></div>
        <div class="done-stat"><div class="done-stat-num" style="color:#2e7d32">${quizStats.good}</div><div class="done-stat-label">記得</div></div>
        <div class="done-stat"><div class="done-stat-num" style="color:#1565c0">${quizStats.easy}</div><div class="done-stat-label">很熟</div></div>
      </div>
      <button class="restart-btn" onclick="startQuiz()">再來一輪</button>
    </div>
  `;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
speechSynthesis.onvoiceschanged = () => {};
loadData();
</script>
